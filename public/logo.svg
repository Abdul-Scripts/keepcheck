<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">KeepCheck Business Check Draft</title>
  <desc id="desc">Rounded app icon with a wide business-check outline and right-side checkmark.</desc>
  <defs>
    <style>
      @font-face {
        font-family: "OdinRoundedBold";
        src: url("./fonts/OdinRounded-Bold.otf") format("opentype");
        font-weight: 700;
        font-style: normal;
      }
    </style>
  </defs>
  <rect x="24" y="24" width="464" height="464" rx="112" fill="#0F172A"/>
  <rect x="28" y="28" width="456" height="456" rx="108" fill="none" stroke="#A5B4FC" stroke-width="8" opacity="0.75"/>

  <!-- Wide, short check card -->
  <rect x="78" y="152" width="356" height="206" rx="28" fill="#F8FAFC"/>
  <rect x="78" y="152" width="356" height="54" rx="28" fill="#E5E7EB"/>

  <!-- Left-side details to imply a business check -->
  <rect x="108" y="228" width="170" height="14" rx="7" fill="#CBD5E1"/>
  <rect x="108" y="258" width="132" height="14" rx="7" fill="#CBD5E1"/>
  <rect x="108" y="288" width="186" height="14" rx="7" fill="#CBD5E1"/>
  <text x="166" y="132" text-anchor="middle" fill="#A5B4FC" font-size="46" font-family="OdinRoundedBold, Arial Rounded MT Bold, sans-serif" font-weight="700" letter-spacing="1">KEEP</text>
  <text x="336" y="406" text-anchor="middle" fill="#A5B4FC" font-size="46" font-family="OdinRoundedBold, Arial Rounded MT Bold, sans-serif" font-weight="700" letter-spacing="1">CHECK</text>

  <!-- Large cylindrical gold coins on the lower-left -->
  <!-- Smaller coin behind -->
  <ellipse cx="148" cy="355" rx="40" ry="11" fill="#92400E"/>
  <rect x="108" y="337" width="80" height="18" rx="0" fill="#92400E"/>
  <ellipse cx="148" cy="338" rx="40" ry="11" fill="#F59E0B"/>

  <!-- Larger front coin -->
  <ellipse cx="100" cy="375" rx="46" ry="13" fill="#B45309"/>
  <rect x="54" y="353" width="92" height="22" rx="0" fill="#B45309"/>
  <ellipse cx="100" cy="352" rx="46" ry="13" fill="#FBBF24"/>

  <!-- Amount badge and right-side checkmark -->
  <circle cx="360" cy="269" r="46" fill="#D1FAE5"/>
  <path d="M334 271l16 16 36-36" fill="none" stroke="#16A34A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
